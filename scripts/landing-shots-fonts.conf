<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Font setup for scripts/capture-landing-shots.mjs only (via FONTCONFIG_FILE).
  Headless Chromium resolves the app's `system-ui` through fontconfig; on a
  bare Linux/WSL box that lands on DejaVu Sans, which looks nothing like a
  phone. Prefer Roboto (the Android system font) with Noto Color Emoji
  fallback so marketing screenshots match what real users see.

  The rules must be match/edit with a strong prepend AND come after the
  system include — the distro's 60-latin.conf also prepends its families,
  and whichever prepend runs last ends up at the front of the list.

  Requires both fonts to be installed, e.g. in ~/.local/share/fonts:
    Roboto:           https://github.com/google/fonts/raw/main/ofl/roboto/Roboto%5Bwdth,wght%5D.ttf
    Noto Color Emoji: https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf
-->
<fontconfig>
  <include ignore_missing="yes">/etc/fonts/fonts.conf</include>
  <match target="pattern">
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Roboto</string></edit>
    <edit name="family" mode="append"><string>Noto Color Emoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>system-ui</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Roboto</string></edit>
    <edit name="family" mode="append"><string>Noto Color Emoji</string></edit>
  </match>
</fontconfig>
